<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPE Compliance Records | Worker Safety Database v6.6</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0f172a; --secondary: #1e293b; --accent: #f59e0b;
            --safe: #22c55e; --warning: #f59e0b; --critical: #ef4444;
            --text: #e2e8f0; --text-muted: #94a3b8; --border: #334155;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--primary); color: var(--text); min-height: 100vh;
        }
        .header {
            background: var(--secondary); border-bottom: 1px solid var(--border);
            padding: 1.25rem 2rem; display: flex; justify-content: space-between;
            align-items: center; position: sticky; top: 0; z-index: 100;
        }
        .header h1 { font-size: 1.4rem; font-weight: 600; display: flex; align-items: center; gap: 0.75rem; }
        .header h1::before { content: "🛡️"; font-size: 1.75rem; }
        .stats-bar { display: flex; gap: 1rem; }
        .stat-pill {
            background: var(--primary); border: 1px solid var(--border); border-radius: 9999px;
            padding: 0.5rem 1rem; font-size: 0.875rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .stat-pill .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .dot.safe { background: var(--safe); } .dot.warning { background: var(--warning); }
        .dot.critical { background: var(--critical); }
        .container {
            display: grid; grid-template-columns: 300px 1fr; gap: 0;
            min-height: calc(100vh - 72px);
        }
        .sidebar {
            background: var(--secondary); border-right: 1px solid var(--border);
            overflow-y: auto; max-height: calc(100vh - 72px);
        }
        .sidebar-header {
            padding: 1rem; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; background: var(--secondary); z-index: 10;
        }
        .sidebar-header h2 {
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--text-muted); margin-bottom: 0.75rem;
        }
        .search-box {
            width: 100%; padding: 0.5rem 0.75rem; background: var(--primary);
            border: 1px solid var(--border); border-radius: 0.5rem; color: var(--text);
            font-size: 0.875rem; outline: none;
        }
        .search-box:focus { border-color: var(--accent); }
        .search-box::placeholder { color: var(--text-muted); }
        .worker-list { list-style: none; }
        .worker-item {
            padding: 0.875rem 1rem; border-bottom: 1px solid var(--border);
            cursor: pointer; transition: all 0.2s; display: flex;
            align-items: center; gap: 0.75rem;
        }
        .worker-item:hover { background: rgba(245, 158, 11, 0.05); }
        .worker-item.active {
            background: rgba(245, 158, 11, 0.1); border-left: 3px solid var(--accent);
        }
        .worker-avatar {
            width: 36px; height: 36px; border-radius: 50%; background: var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }
        .worker-info { flex: 1; min-width: 0; }
        .worker-name {
            font-weight: 500; font-size: 0.875rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .worker-meta {
            font-size: 0.7rem; color: var(--text-muted); margin-top: 0.2rem;
        }
        .worker-badge {
            padding: 0.2rem 0.5rem; border-radius: 0.25rem; font-size: 0.65rem;
            font-weight: 600; text-transform: uppercase; flex-shrink: 0;
        }
        .badge-safe { background: rgba(34, 197, 94, 0.15); color: var(--safe); }
        .badge-violation { background: rgba(239, 68, 68, 0.15); color: var(--critical); }
        .main-content { padding: 1.5rem; overflow-y: auto; max-height: calc(100vh - 72px); }
        .content-header { margin-bottom: 1.5rem; }
        .content-header h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.4rem; }
        .content-header p { color: var(--text-muted); font-size: 0.8rem; }
        .profile-card {
            background: var(--secondary); border: 1px solid var(--border);
            border-radius: 0.75rem; padding: 1.25rem; margin-bottom: 1.5rem;
            display: grid; grid-template-columns: auto 1fr auto; gap: 1.25rem; align-items: center;
        }
        .profile-avatar {
            width: 56px; height: 56px; border-radius: 50%; background: var(--primary);
            display: flex; align-items: center; justify-content: center; font-size: 1.75rem;
        }
        .profile-details h3 { font-size: 1rem; margin-bottom: 0.2rem; }
        .profile-details .id-tag {
            display: inline-block; background: var(--primary); padding: 0.2rem 0.5rem;
            border-radius: 0.25rem; font-size: 0.7rem; color: var(--text-muted); font-family: monospace;
        }
        .profile-stats { display: flex; gap: 1.25rem; }
        .profile-stat { text-align: center; }
        .profile-stat .value { font-size: 1.25rem; font-weight: 700; display: block; }
        .profile-stat .label {
            font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;
        }
        .profile-stat.safe .value { color: var(--safe); }
        .profile-stat.warning .value { color: var(--warning); }
        .profile-stat.critical .value { color: var(--critical); }
        .table-container {
            background: var(--secondary); border: 1px solid var(--border);
            border-radius: 0.75rem; overflow: hidden;
        }
        .table-header {
            padding: 0.875rem 1.25rem; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .table-header h3 { font-size: 0.9rem; font-weight: 600; }
        .filter-tabs {
            display: flex; gap: 0.2rem; background: var(--primary);
            padding: 0.2rem; border-radius: 0.4rem;
        }
        .filter-tab {
            padding: 0.4rem 0.875rem; border: none; background: transparent;
            color: var(--text-muted); font-size: 0.8rem; cursor: pointer;
            border-radius: 0.3rem; transition: all 0.2s;
        }
        .filter-tab:hover { color: var(--text); }
        .filter-tab.active { background: var(--accent); color: var(--primary); font-weight: 600; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: rgba(15, 23, 42, 0.5); }
        th {
            padding: 0.75rem 1.25rem; text-align: left; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);
            font-weight: 600; border-bottom: 1px solid var(--border);
        }
        td { padding: 0.875rem 1.25rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
        tr:hover { background: rgba(245, 158, 11, 0.03); }
        tr:last-child td { border-bottom: none; }
        .status-cell { display: flex; align-items: center; gap: 0.5rem; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-safe {
            background: rgba(34, 197, 94, 0.15); color: var(--safe);
            padding: 0.3rem 0.625rem; border-radius: 0.3rem; font-size: 0.75rem; font-weight: 600;
        }
        .status-violation {
            background: rgba(239, 68, 68, 0.15); color: var(--critical);
            padding: 0.3rem 0.625rem; border-radius: 0.3rem; font-size: 0.75rem; font-weight: 600;
        }
        .timestamp { font-family: monospace; color: var(--text-muted); font-size: 0.75rem; }
        .event-type { font-weight: 600; }
        .event-type.violation { color: var(--critical); }
        .event-type.safe { color: var(--safe); }
        .empty-state { text-align: center; padding: 3rem 2rem; color: var(--text-muted); }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.5; }
        .empty-state h3 { font-size: 1rem; margin-bottom: 0.4rem; color: var(--text); }
        .export-btn {
            background: var(--accent); color: var(--primary); border: none;
            padding: 0.5rem 1rem; border-radius: 0.4rem; font-size: 0.8rem;
            font-weight: 600; cursor: pointer; transition: opacity 0.2s;
        }
        .export-btn:hover { opacity: 0.85; }
        .file-input {
            display: none;
        }
        .upload-btn {
            background: var(--secondary); color: var(--text); border: 1px solid var(--border);
            padding: 0.5rem 1rem; border-radius: 0.4rem; font-size: 0.8rem;
            cursor: pointer; transition: all 0.2s; margin-left: 0.5rem;
        }
        .upload-btn:hover { border-color: var(--accent); color: var(--accent); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .sidebar { max-height: 250px; border-right: none; border-bottom: 1px solid var(--border); }
        }
    </style>
<base target="_blank">
</head>
<body>
    <header class="header">
        <h1>PPE Compliance Records v6.6</h1>
        <div class="stats-bar">
            <div class="stat-pill"><span class="dot safe"></span><span id="total-workers">0 Workers</span></div>
            <div class="stat-pill"><span class="dot warning"></span><span id="total-records">0 Records</span></div>
            <div class="stat-pill"><span class="dot critical"></span><span id="total-violations">0 Violations</span></div>
        </div>
    </header>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Workers Database</h2>
                <input type="text" class="search-box" id="workerSearch" placeholder="Search workers...">
            </div>
            <ul class="worker-list" id="workerList"></ul>
        </aside>
        <main class="main-content" id="mainContent">
            <div class="empty-state">
                <div class="icon">👷</div>
                <h3>Select a Worker</h3>
                <p>Click on a worker from the sidebar to view their safety records</p>
                <p style="margin-top:1rem;font-size:0.75rem;">Or <label class="upload-btn" for="csvFile">📁 Load CSV File</label>
                <input type="file" id="csvFile" class="file-input" accept=".csv" onchange="loadCSVFile(event)"></p>
            </div>
        </main>
    </div>
    <script>
        let allRecords = [], workers = {}, currentWorker = null, currentFilter = 'all';

        // Proper CSV parser that handles quoted fields with commas
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            if (lines.length < 2) return [];

            const records = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const row = parseCSVLine(lines[i]);
                if (row.length >= 7) {
                    records.push({
                        Timestamp: row[0] || '',
                        Face_ID: row[1] || '',
                        Track_ID: row[2] || '',
                        Name: row[3] || '',
                        Event: row[4] || '',
                        Helmet_Status: row[5] || '',
                        Vest_Status: row[6] || ''
                    });
                }
            }
            return records;
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                const nextChar = line[i + 1];

                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        current += '"';
                        i++; // Skip next quote
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        async function loadCSV() {
            try {
                const response = await fetch('worker_safety_report.csv');
                if (!response.ok) throw new Error('CSV not found');
                const csvText = await response.text();
                processData(csvText);
            } catch (err) {
                showEmptyState();
            }
        }

        function loadCSVFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                processData(e.target.result);
            };
            reader.readAsText(file);
        }

        function processData(csvText) {
            allRecords = parseCSV(csvText);
            processWorkers();
            renderWorkerList();
            updateStats();
        }

        function showEmptyState() {
            document.getElementById('workerList').innerHTML = 
                `<li class="worker-item" style="justify-content:center;color:var(--text-muted);padding:2rem 1rem;text-align:center">
                    <div>No records found.<br><small>Run the PPE system or load a CSV file.</small></div>
                </li>`;
        }

        function processWorkers() {
            workers = {};
            allRecords.forEach(r => {
                const key = `${r.Face_ID || 'Unknown'}-${r.Name || 'Unknown'}`;
                if (!workers[key]) {
                    workers[key] = { 
                        faceId: r.Face_ID || 'Unknown', 
                        name: r.Name || 'Unknown Worker',
                        records: [], violations: 0, safeCount: 0, lastSeen: null 
                    };
                }
                workers[key].records.push(r);
                if (r.Event === 'VIOLATION') workers[key].violations++;
                else workers[key].safeCount++;
                const t = new Date(r.Timestamp);
                if (!workers[key].lastSeen || t > workers[key].lastSeen) workers[key].lastSeen = t;
            });
        }

        function renderWorkerList(term = '') {
            const list = document.getElementById('workerList');
            const filtered = Object.entries(workers).filter(([k, w]) => {
                if (!term) return true;
                const t = term.toLowerCase();
                return w.name.toLowerCase().includes(t) || w.faceId.toString().toLowerCase().includes(t);
            });
            if (filtered.length === 0) {
                list.innerHTML = `<li class="worker-item" style="justify-content:center;color:var(--text-muted)">No workers found</li>`;
                return;
            }
            list.innerHTML = filtered.map(([k, w]) => {
                const active = currentWorker === k;
                const badge = w.violations > 0 ? 'badge-violation' : 'badge-safe';
                const txt = w.violations > 0 ? `${w.violations} Issues` : 'Compliant';
                const last = w.lastSeen ? w.lastSeen.toLocaleDateString() : 'N/A';
                return `<li class="worker-item ${active ? 'active' : ''}" onclick="selectWorker('${k}')" data-key="${k}">
                    <div class="worker-avatar">👷</div>
                    <div class="worker-info">
                        <div class="worker-name">${esc(w.name)}</div>
                        <div class="worker-meta">ID: ${w.faceId} • Last: ${last}</div>
                    </div>
                    <span class="worker-badge ${badge}">${txt}</span>
                </li>`;
            }).join('');
        }

        function selectWorker(key) {
            currentWorker = key;
            document.querySelectorAll('.worker-item').forEach(el => el.classList.toggle('active', el.dataset.key === key));
            renderDetail(workers[key]);
        }

        function renderDetail(w) {
            const total = w.records.length;
            const rate = total > 0 ? ((w.violations / total) * 100).toFixed(1) : 0;
            document.getElementById('mainContent').innerHTML = `
                <div class="content-header">
                    <h2>Worker Safety Records</h2>
                    <p>Detailed compliance history for ${esc(w.name)}</p>
                </div>
                <div class="profile-card">
                    <div class="profile-avatar">👷</div>
                    <div class="profile-details">
                        <h3>${esc(w.name)}</h3>
                        <span class="id-tag">Face ID: ${w.faceId}</span>
                    </div>
                    <div class="profile-stats">
                        <div class="profile-stat safe"><span class="value">${w.safeCount}</span><span class="label">Safe</span></div>
                        <div class="profile-stat warning"><span class="value">${total}</span><span class="label">Checks</span></div>
                        <div class="profile-stat ${w.violations > 0 ? 'critical' : 'safe'}"><span class="value">${w.violations}</span><span class="label">Violations</span></div>
                        <div class="profile-stat ${rate > 20 ? 'critical' : rate > 10 ? 'warning' : 'safe'}"><span class="value">${rate}%</span><span class="label">Rate</span></div>
                    </div>
                </div>
                <div class="table-container">
                    <div class="table-header">
                        <h3>📋 Compliance History</h3>
                        <div style="display:flex;gap:0.5rem;align-items:center;">
                            <div class="filter-tabs">
                                <button class="filter-tab ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</button>
                                <button class="filter-tab ${currentFilter === 'violation' ? 'active' : ''}" onclick="setFilter('violation')">Violations</button>
                                <button class="filter-tab ${currentFilter === 'safe' ? 'active' : ''}" onclick="setFilter('safe')">Safe</button>
                            </div>
                            <button class="export-btn" onclick="exportCSV()">📥 Export</button>
                        </div>
                    </div>
                    <table>
                        <thead><tr><th>Timestamp</th><th>Event</th><th>Helmet Status</th><th>Vest Status</th><th>Track ID</th></tr></thead>
                        <tbody>${renderRecords(w.records)}</tbody>
                    </table>
                </div>`;
        }

        function renderRecords(records) {
            let f = records;
            if (currentFilter === 'violation') f = records.filter(r => r.Event === 'VIOLATION');
            else if (currentFilter === 'safe') f = records.filter(r => r.Event !== 'VIOLATION');
            if (f.length === 0) return `<tr><td colspan="5"><div class="empty-state" style="padding:2rem"><div class="icon">📭</div><h3>No records</h3></div></td></tr>`;
            return f.map(r => {
                const bad = r.Event === 'VIOLATION';
                return `<tr>
                    <td class="timestamp">${esc(r.Timestamp)}</td>
                    <td><span class="event-type ${bad ? 'violation' : 'safe'}">${bad ? 'VIOLATION' : 'SAFE'}</span></td>
                    <td><div class="status-cell"><span class="status-dot" style="background:${hColor(r.Helmet_Status)}"></span>${esc(r.Helmet_Status)}</div></td>
                    <td><div class="status-cell"><span class="status-dot" style="background:${vColor(r.Vest_Status)}"></span>${esc(r.Vest_Status)}</div></td>
                    <td class="timestamp">${esc(r.Track_ID)}</td>
                </tr>`;
            }).join('');
        }

        function setFilter(f) { currentFilter = f; if (currentWorker) renderDetail(workers[currentWorker]); }
        function hColor(s) { if (!s) return '#94a3b8'; const l = s.toLowerCase(); if (l.includes('correctly') || l.includes('worn')) return '#22c55e'; if (l.includes('not') || l.includes('no')) return '#ef4444'; return '#f59e0b'; }
        function vColor(s) { if (!s) return '#94a3b8'; const l = s.toLowerCase(); if (l.includes('correctly') || l.includes('worn')) return '#22c55e'; if (l.includes('not') || l.includes('no')) return '#ef4444'; if (l.includes('detected')) return '#f59e0b'; return '#94a3b8'; }
        function updateStats() {
            document.getElementById('total-workers').textContent = `${Object.keys(workers).length} Workers`;
            document.getElementById('total-records').textContent = `${allRecords.length} Records`;
            document.getElementById('total-violations').textContent = `${allRecords.filter(r => r.Event === 'VIOLATION').length} Violations`;
        }
        function esc(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function exportCSV() {
            const w = workers[currentWorker]; if (!w) return;
            let csv = 'Timestamp,Face_ID,Track_ID,Name,Event,Helmet_Status,Vest_Status\n';
            w.records.forEach(r => {
                const vs = r.Vest_Status.includes(',') ? `"${r.Vest_Status}"` : r.Vest_Status;
                const hs = r.Helmet_Status.includes(',') ? `"${r.Helmet_Status}"` : r.Helmet_Status;
                csv += `${r.Timestamp},${r.Face_ID},${r.Track_ID},${r.Name},${r.Event},${hs},${vs}\n`;
            });
            const blob = new Blob([csv], {type: 'text/csv'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `worker_${w.faceId}_records.csv`; a.click();
        }
        document.getElementById('workerSearch').addEventListener('input', e => renderWorkerList(e.target.value));
        setInterval(loadCSV, 10000);
        loadCSV();
    </script>
</body>
</html>
